# Disable audio device suspension so there's no delay/pop when sound starts
# after silence. Default suspend timeout is 5s, which causes audio cutouts
# with Bluetooth headphones and delays in notifications/videos.
# Disable audio device suspension so there's no delay/pop when sound starts
# after silence. Default suspend timeout is 5s, which causes audio cutouts
# with Bluetooth headphones and delays in notifications/videos.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
